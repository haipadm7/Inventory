<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>物品領取掃描器 - 防重複版</title>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        * { box-sizing: border-box; font-family: system-ui, 'Segoe UI', 'Noto Sans TC', sans-serif; }
        body { background: #f0f2f5; margin: 0; padding: 16px; padding-bottom: 80px; }
        .container { max-width: 700px; margin: 0 auto; }
        .card { background: white; border-radius: 24px; padding: 16px 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        h2 { font-size: 1.5rem; margin-top: 0; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .badge { background: #007aff; color: white; border-radius: 40px; padding: 4px 12px; font-size: 0.8rem; font-weight: normal; }
        button { background: #007aff; border: none; color: white; padding: 10px 16px; border-radius: 40px; font-size: 1rem; font-weight: 500; cursor: pointer; transition: 0.2s; }
        button.secondary { background: #8e8e93; }
        button.danger { background: #ff3b30; }
        button.outline { background: transparent; border: 1px solid #007aff; color: #007aff; }
        .flex-row { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; margin-top: 12px; }
        table { width: 100%; border-collapse: collapse; margin-top: 12px; }
        th, td { text-align: left; padding: 10px 6px; border-bottom: 1px solid #e9ecef; }
        th { font-weight: 600; color: #495057; }
        .delete-btn { background: none; border: none; color: #ff3b30; font-size: 1.2rem; cursor: pointer; padding: 0 4px; }
        .progress-info { background: #e9ecef; border-radius: 20px; padding: 8px 12px; font-weight: 500; margin-bottom: 12px; }
        #reader { width: 100%; max-width: 500px; margin: 0 auto; }
        .scanner-area { text-align: center; }
        input, .search-box { padding: 10px; border-radius: 12px; border: 1px solid #ccc; width: 100%; font-size: 1rem; }
        .pagination { display: flex; justify-content: center; gap: 12px; margin-top: 16px; align-items: center; flex-wrap: wrap; }
        .page-btn { background: #e9ecef; color: #1c1c1e; padding: 6px 12px; border-radius: 30px; font-size: 0.9rem; border: none; cursor: pointer; }
        .page-btn.active { background: #007aff; color: white; }
        .setting-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; background: #f8f9fa; padding: 8px 12px; border-radius: 20px; margin-top: 8px; }
        .setting-row label { font-weight: 500; }
        .setting-row input { width: 80px; text-align: center; }
        .cooldown-msg { color: #ff3b30; font-size: 0.8rem; margin-left: 8px; display: inline-block; }
        @media print {
            body { background: white; padding: 0; }
            .no-print { display: none; }
            .sign-line { margin-top: 40px; border-top: 1px dashed #000; padding-top: 8px; }
        }
        .sign-line { margin-top: 32px; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #aaa; padding-top: 12px; font-size: 1rem; }
        .loading { text-align: center; padding: 20px; color: #666; }
        .sync-status { background: #e9ecef; border-radius: 20px; padding: 6px 12px; font-size: 0.8rem; margin-bottom: 10px; text-align: center; }
    </style>
</head>
<body>
<div class="container">
    <div class="card no-print">
        <div class="setting-row">
            <label>📅 每日領取上限：</label>
            <input type="number" id="maxItemsInput" min="1" max="500" value="50" style="width: 80px;">
            <button id="setMaxBtn" class="outline">設定</button>
        </div>
        <div class="setting-row">
            <label>⏱️ 掃描冷卻時間 (秒)：</label>
            <input type="number" id="cooldownInput" min="0.5" max="3" step="0.1" value="1.0" style="width: 80px;">
            <button id="setCooldownBtn" class="outline">設定</button>
        </div>
    </div>

    <div class="card no-print">
        <h2>📦 物品庫 <span id="totalCountBadge" class="badge">0</span></h2>
        <div id="syncStatus" class="sync-status">🔄 正在從 NAS 載入物品庫...</div>
        <div class="flex-row">
            <input type="text" id="searchLibrary" placeholder="🔍 搜尋 Barcode 或 物品名稱" style="flex:1;">
        </div>
        <div style="max-height: 350px; overflow-y: auto; margin-top: 12px;">
            <table id="libraryTable">
                <thead><tr><th>Barcode</th><th>物品名稱</th><th></th></tr></thead>
                <tbody id="libraryTbody"></tbody>
            </table>
        </div>
        <div class="pagination" id="paginationControls"></div>
    </div>

    <div class="card scanner-area no-print">
        <h2>📷 掃描 Barcode</h2>
        <div id="reader" style="width:100%;"></div>
        <p id="scanStatus">✅ 點擊「開啟相機」開始掃描</p>
        <button id="startScannerBtn">📱 開啟相機</button>
        <button id="stopScannerBtn" class="secondary">⏹️ 停止相機</button>
    </div>

    <div class="card">
        <h2>📋 今日領取清單 <span id="countDisplay" class="badge">0 / 50</span></h2>
        <div class="progress-info" id="progressMsg">尚未掃描任何物品</div>
        <table id="todayListTable">
            <thead><tr><th>#</th><th>Barcode</th><th>物品名稱</th><th></th></tr></thead>
            <tbody id="todayListBody"></tbody>
        </table>
        <div class="flex-row">
            <button id="saveCsvBtn">💾 儲存為 CSV</button>
            <button id="printBtn" class="secondary">🖨️ 列印簽名單</button>
            <button id="clearTodayBtn" class="danger">🗑️ 清空今日清單</button>
        </div>
    </div>
</div>

<script>
    // --- 全域變數 ---
    let library = {};           // 物品庫 { barcode: name }
    let todayItems = [];        // 今日已掃描物品 [{ barcode, name, timestamp }]
    let MAX_ITEMS = 50;         // 每日上限
    let SCAN_COOLDOWN_MS = 1000; // 掃描冷卻時間 (毫秒)
    let lastScanTime = 0;       // 最後一次成功掃描的時間戳

    let currentPage = 1;
    const PAGE_SIZE = 50;
    let currentSearchTerm = "";
    let html5QrCode = null;
    let scannerStarted = false;

    // --- DOM 元素 ---
    const libraryTbody = document.getElementById("libraryTbody");
    const totalCountBadge = document.getElementById("totalCountBadge");
    const paginationDiv = document.getElementById("paginationControls");
    const searchInput = document.getElementById("searchLibrary");
    const todayListBody = document.getElementById("todayListBody");
    const countDisplay = document.getElementById("countDisplay");
    const progressMsg = document.getElementById("progressMsg");
    const maxItemsInput = document.getElementById("maxItemsInput");
    const cooldownInput = document.getElementById("cooldownInput");
    const syncStatusDiv = document.getElementById("syncStatus");

    // --- 初始化 & 載入資料 ---
    function loadCooldownSetting() {
        const saved = localStorage.getItem("scan_cooldown_ms");
        if (saved) {
            SCAN_COOLDOWN_MS = parseInt(saved);
            cooldownInput.value = (SCAN_COOLDOWN_MS / 1000).toFixed(1);
        } else {
            cooldownInput.value = "1.0";
        }
    }

    function saveCooldownSetting() {
        localStorage.setItem("scan_cooldown_ms", SCAN_COOLDOWN_MS);
    }

    function setCooldown() {
        let newSecs = parseFloat(cooldownInput.value);
        if (isNaN(newSecs)) newSecs = 1.0;
        if (newSecs < 0.5) newSecs = 0.5;
        if (newSecs > 3.0) newSecs = 3.0;
        SCAN_COOLDOWN_MS = newSecs * 1000;
        cooldownInput.value = newSecs.toFixed(1);
        saveCooldownSetting();
        alert(`掃描冷卻時間已設為 ${newSecs} 秒`);
    }

    // 從 NAS 載入物品庫 CSV
    async function loadLibraryFromNAS() {
        syncStatusDiv.innerHTML = "🔄 正在從 NAS 載入物品庫...";
        try {
            // 假設 CSV 檔案同 index.html 放晌同一資料夾，叫 items.csv
            const response = await fetch("items.csv?" + new Date().getTime());
            if (!response.ok) throw new Error("無法載入 items.csv");
            const csvText = await response.text();
            
            const lines = csvText.split(/\r?\n/);
            let count = 0;
            const newLibrary = {};
            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();
                if (line === "") continue;
                // 簡單解析 CSV (支援引號)
                let parts = line.split(",");
                if (parts.length < 2) continue;
                let barcode = parts[0].replace(/^"|"$/g, '').trim();
                let name = parts[1].replace(/^"|"$/g, '').trim();
                if (barcode && name) {
                    newLibrary[barcode] = name;
                    count++;
                }
            }
            library = newLibrary;
            syncStatusDiv.innerHTML = `✅ 已從 NAS 載入 ${count} 件物品`;
            renderLibraryTable();
        } catch (error) {
            console.error("載入失敗:", error);
            syncStatusDiv.innerHTML = "⚠️ 無法載入 items.csv，請確認檔案存在同一資料夾";
            library = {};
            renderLibraryTable();
        }
    }

    function getFilteredLibraryArray() {
        let items = Object.entries(library).map(([barcode, name]) => ({ barcode, name }));
        if (currentSearchTerm.trim() !== "") {
            const term = currentSearchTerm.trim().toLowerCase();
            items = items.filter(item => item.barcode.toLowerCase().includes(term) || item.name.toLowerCase().includes(term));
        }
        return items;
    }

    function renderLibraryTable() {
        const filtered = getFilteredLibraryArray();
        totalCountBadge.innerText = filtered.length;
        const totalPages = Math.ceil(filtered.length / PAGE_SIZE);
        if (currentPage > totalPages) currentPage = Math.max(1, totalPages);
        const start = (currentPage - 1) * PAGE_SIZE;
        const pageItems = filtered.slice(start, start + PAGE_SIZE);
        libraryTbody.innerHTML = "";
        for (const item of pageItems) {
            const row = libraryTbody.insertRow();
            row.insertCell(0).innerText = item.barcode;
            row.insertCell(1).innerText = item.name;
            const delCell = row.insertCell(2);
            const delBtn = document.createElement("button");
            delBtn.innerText = "刪除";
            delBtn.className = "delete-btn";
            // 注意：刪除只係隱藏，唔會改 NAS 上嘅 CSV
            delBtn.onclick = () => { 
                delete library[item.barcode]; 
                renderLibraryTable(); 
            };
            delCell.appendChild(delBtn);
        }
        renderPagination(totalPages);
    }

    function renderPagination(totalPages) {
        paginationDiv.innerHTML = "";
        if (totalPages <= 1) return;
        const prevBtn = document.createElement("button");
        prevBtn.innerText = "◀ 上一頁";
        prevBtn.className = "page-btn";
        prevBtn.disabled = (currentPage === 1);
        prevBtn.onclick = () => { if (currentPage > 1) { currentPage--; renderLibraryTable(); } };
        paginationDiv.appendChild(prevBtn);
        let startPage = Math.max(1, currentPage - 2);
        let endPage = Math.min(totalPages, startPage + 4);
        if (endPage - startPage < 4) startPage = Math.max(1, endPage - 4);
        for (let i = startPage; i <= endPage; i++) {
            const pageBtn = document.createElement("button");
            pageBtn.innerText = i;
            pageBtn.className = "page-btn";
            if (i === currentPage) pageBtn.classList.add("active");
            pageBtn.onclick = () => { currentPage = i; renderLibraryTable(); };
            paginationDiv.appendChild(pageBtn);
        }
        const nextBtn = document.createElement("button");
        nextBtn.innerText = "下一頁 ▶";
        nextBtn.className = "page-btn";
        nextBtn.disabled = (currentPage === totalPages);
        nextBtn.onclick = () => { if (currentPage < totalPages) { currentPage++; renderLibraryTable(); } };
        paginationDiv.appendChild(nextBtn);
    }

    function updateMaxDisplay() {
        countDisplay.innerText = `${todayItems.length} / ${MAX_ITEMS}`;
        if (todayItems.length >= MAX_ITEMS) {
            progressMsg.innerText = `已達今日上限 ${MAX_ITEMS} 件，請清空或明天再掃描`;
        } else {
            progressMsg.innerText = `已領取 ${todayItems.length} 件，尚可領取 ${MAX_ITEMS - todayItems.length} 件`;
        }
    }

    function saveToday() { 
        localStorage.setItem("today_items", JSON.stringify(todayItems)); 
        renderTodayList(); 
    }
    
    function saveMaxLimit() { 
        localStorage.setItem("max_items_limit", MAX_ITEMS); 
    }

    function loadData() {
        const storedToday = localStorage.getItem("today_items");
        todayItems = storedToday ? JSON.parse(storedToday) : [];
        const storedMax = localStorage.getItem("max_items_limit");
        if (storedMax) { 
            MAX_ITEMS = parseInt(storedMax); 
            maxItemsInput.value = MAX_ITEMS;
        }
        renderTodayList();
        loadLibraryFromNAS(); // 從 NAS 載入物品庫
    }

    function renderTodayList() {
        todayListBody.innerHTML = "";
        updateMaxDisplay();
        todayItems.forEach((item, idx) => {
            const row = todayListBody.insertRow();
            row.insertCell(0).innerText = idx+1;
            row.insertCell(1).innerText = item.barcode;
            row.insertCell(2).innerText = item.name;
            const delCell = row.insertCell(3);
            const delBtn = document.createElement("button");
            delBtn.innerText = "❌";
            delBtn.className = "delete-btn";
            delBtn.onclick = () => { 
                todayItems.splice(idx, 1); 
                saveToday(); 
            };
            delCell.appendChild(delBtn);
        });
    }

    // --- 掃描成功處理 (加入冷卻 & 重複檢查) ---
    async function onScanSuccess(decodedText) {
        if (!scannerStarted) return;

        // 1. 冷卻時間檢查
        const now = Date.now();
        if (now - lastScanTime < SCAN_COOLDOWN_MS) {
            console.log("冷卻中，忽略掃描");
            return;
        }

        // 2. 每日上限檢查
        if (todayItems.length >= MAX_ITEMS) { 
            alert(`已達每日上限 ${MAX_ITEMS} 件`); 
            return; 
        }
        
        const barcode = decodedText.trim();
        
        // 3. 重複檢查 (同一天同一條碼)
        if (todayItems.find(item => item.barcode === barcode)) { 
            alert(`物品「${library[barcode] || barcode}」今日已經掃描過，不可重複領取`); 
            return; 
        }
        
        // 4. 取得物品名稱
        let itemName = library[barcode];
        if (!itemName) {
            let newName = prompt(`未找到物品「${barcode}」，請輸入物品名稱：`, "未知物品");
            if (newName && newName.trim() !== "") { 
                itemName = newName.trim(); 
                // 可選：是否要將新物品加回 NAS 的 library？此處只加到當前 session 的 library 變數
                library[barcode] = itemName;
                renderLibraryTable(); // 更新顯示
            } else {
                alert("沒有輸入名稱，跳過此筆掃描");
                return;
            }
        }
        
        // 5. 全部通過，加入清單
        lastScanTime = now;
        todayItems.push({
            barcode: barcode,
            name: itemName,
            timestamp: new Date().toISOString()
        });
        saveToday();
        
        // 震動提示
        if (navigator.vibrate) navigator.vibrate(200);
        
        // 可選：在畫面上短暫顯示成功訊息
        const statusP = document.getElementById("scanStatus");
        const originalText = statusP.innerText;
        statusP.innerText = `✅ 已記錄: ${itemName} (${barcode})`;
        setTimeout(() => {
            if (scannerStarted) statusP.innerText = originalText;
        }, 1500);
    }

    // --- 掃描器控制 ---
    function startScanner() {
        if (scannerStarted) return;
        const readerElement = document.getElementById("reader");
        if (!readerElement) return;
        html5QrCode = new Html5Qrcode("reader");
        const config = { 
            fps: 15, 
            qrbox: { width: 300, height: 300 },
            aspectRatio: 1.0
        };
        html5QrCode.start(
            { facingMode: "environment" }, 
            config, 
            onScanSuccess, 
            (errMsg) => { /* 掃描失敗的訊息太多了，不特別處理 */ }
        ).then(() => {
            scannerStarted = true;
            document.getElementById("scanStatus").innerText = "📸 相機已開啟，請對準條碼 (有冷卻時間，不會重複掃)";
        }).catch(err => { 
            alert("無法開啟相機，請確認已授予相機權限"); 
            scannerStarted = false;
        });
    }

    function stopScanner() {
        if (html5QrCode && scannerStarted) {
            html5QrCode.stop().then(() => { 
                scannerStarted = false; 
                document.getElementById("scanStatus").innerText = "⏹️ 相機已停止"; 
            }).catch(()=>{});
        } else { 
            scannerStarted = false; 
        }
    }

    // --- 匯出 & 列印功能 ---
    function exportTodayToCsv() {
        if (todayItems.length === 0) { alert("無記錄"); return; }
        const dateStr = new Date().toISOString().slice(0,19).replace(/:/g, "-");
        const headers = ["序號","Barcode","物品名稱","領取時間"];
        const rows = todayItems.map((item, idx) => [idx+1, item.barcode, item.name, new Date(item.timestamp).toLocaleString()]);
        const csvContent = [headers, ...rows].map(row => row.map(cell => `"${cell}"`).join(",")).join("\n");
        const blob = new Blob(["\uFEFF" + csvContent], { type: "text/csv;charset=utf-8;" });
        const link = document.createElement("a");
        const url = URL.createObjectURL(blob);
        link.href = url;
        link.download = `領取記錄_${dateStr}.csv`;
        link.click();
        URL.revokeObjectURL(url);
    }

    function printSignatureSheet() {
        if (todayItems.length === 0) { alert("無記錄可列印"); return; }
        const now = new Date().toLocaleString();
        let html = `<html><head><meta charset="UTF-8"><title>領取簽名單</title><style>body{font-family:system-ui;margin:20px;} table{border-collapse:collapse;width:100%} th,td{border:1px solid #aaa;padding:8px} .sign-area{display:flex;justify-content:space-between;margin-top:40px} .sign-line{width:45%;border-top:1px solid #000;padding-top:8px;text-align:center}</style></head>
        <body><h2>每日領取物品清單</h2><p>日期：${now}</p><p>總數：${todayItems.length} / 上限 ${MAX_ITEMS} 件</p><table><thead><tr><th>#</th><th>Barcode</th><th>物品名稱</th></tr></thead><tbody>`;
        todayItems.forEach((item, idx) => { html += `<tr><td>${idx+1}</td><td>${item.barcode}</td><td>${item.name}</td></tr>`; });
        html += `</tbody><tr><div class="sign-area"><div class="sign-line">領取人簽名：_________________</div><div class="sign-line">核對人員：_________________</div></div></body></html>`;
        const w = window.open('', '_blank');
        w.document.write(html);
        w.document.close();
        w.print();
    }

    function setMaxItems() {
        let newMax = parseInt(maxItemsInput.value);
        if (isNaN(newMax)) newMax = 50;
        if (newMax < 1) newMax = 1;
        if (newMax > 500) newMax = 500;
        MAX_ITEMS = newMax;
        maxItemsInput.value = MAX_ITEMS;
        saveMaxLimit();
        updateMaxDisplay();
        if (todayItems.length > MAX_ITEMS) { 
            todayItems = todayItems.slice(0, MAX_ITEMS); 
            saveToday(); 
        }
        alert(`每日上限已設為 ${MAX_ITEMS} 件`);
    }

    // --- 事件綁定 ---
    document.getElementById("startScannerBtn").onclick = startScanner;
    document.getElementById("stopScannerBtn").onclick = stopScanner;
    document.getElementById("saveCsvBtn").onclick = exportTodayToCsv;
    document.getElementById("printBtn").onclick = printSignatureSheet;
    document.getElementById("clearTodayBtn").onclick = () => { 
        if (confirm("清空今日所有記錄？")) { 
            todayItems = []; 
            saveToday(); 
        } 
    };
    document.getElementById("setMaxBtn").onclick = setMaxItems;
    document.getElementById("setCooldownBtn").onclick = setCooldown;
    searchInput.oninput = (e) => { 
        currentSearchTerm = e.target.value; 
        currentPage = 1; 
        renderLibraryTable(); 
    };

    loadData();
    loadCooldownSetting();

    window.onbeforeunload = () => { 
        if (html5QrCode && scannerStarted) html5QrCode.stop().catch(()=>{}); 
    };
</script>
</body>
</html>
