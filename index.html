<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>物件掃描器 - 除錯版</title>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        * { box-sizing: border-box; font-family: system-ui, sans-serif; }
        body { background: #f0f2f5; margin: 0; padding: 16px; }
        .container { max-width: 700px; margin: 0 auto; }
        .card { background: white; border-radius: 24px; padding: 16px; margin-bottom: 20px; }
        button { background: #007aff; border: none; color: white; padding: 10px 20px; border-radius: 40px; font-size: 1rem; margin: 5px; }
        .debug { background: #1c1c1e; color: #0f0; font-family: monospace; font-size: 12px; padding: 10px; border-radius: 12px; max-height: 150px; overflow-y: auto; }
        #reader { width: 100%; max-width: 500px; margin: 0 auto; }
        .flex-row { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 8px; border-bottom: 1px solid #ddd; text-align: left; }
        .badge { background: #007aff; color: white; padding: 2px 8px; border-radius: 20px; font-size: 0.8rem; }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h2>📷 Barcode 掃描器 <span id="statusBadge" class="badge">未啟動</span></h2>
        <div id="reader"></div>
        <div class="flex-row">
            <button id="startBtn">📱 開啟相機</button>
            <button id="stopBtn" class="secondary">⏹️ 停止</button>
        </div>
        <div id="debugLog" class="debug">🔍 除錯記錄：\n</div>
    </div>

    <div class="card">
        <h2>📋 今日掃描記錄</h2>
        <div id="scanResult">尚未掃描到任何條碼</div>
        <table id="resultTable">
            <thead><tr><th>時間</th><th>條碼</th></tr></thead>
            <tbody></tbody>
        </table>
        <button id="clearBtn" class="secondary">🗑️ 清空記錄</button>
    </div>
</div>

<script>
    let html5QrCode = null;
    let scannerStarted = false;
    let scanCount = 0;
    const debugDiv = document.getElementById("debugLog");
    const resultBody = document.getElementById("resultTable").querySelector("tbody");

    function addLog(msg) {
        const time = new Date().toLocaleTimeString();
        debugDiv.innerHTML += `[${time}] ${msg}\n`;
        debugDiv.scrollTop = debugDiv.scrollHeight;
        console.log(msg);
    }

    function addScanResult(barcode) {
        scanCount++;
        const row = resultBody.insertRow();
        row.insertCell(0).innerText = new Date().toLocaleTimeString();
        row.insertCell(1).innerText = barcode;
        document.getElementById("scanResult").innerHTML = `✅ 已掃描 ${scanCount} 個條碼`;
    }

    function onScanSuccess(decodedText, decodedResult) {
        addLog(`✅ 掃描成功！條碼：${decodedText}`);
        addScanResult(decodedText);
        
        // 震動提示
        if (navigator.vibrate) navigator.vibrate(200);
        
        // 可選：自動停止掃描（測試用）
        // stopScanner();
    }

    function onScanFailure(error) {
        // 正常情況，唔使記低每個錯誤
        // addLog(`⚠️ 掃描失敗：${error}`);
    }

    function startScanner() {
        if (scannerStarted) {
            addLog("⚠️ 掃描器已經啟動");
            return;
        }
        
        const readerElement = document.getElementById("reader");
        if (!readerElement) {
            addLog("❌ 找不到 reader 元素");
            return;
        }
        
        addLog("📸 正在初始化掃描器...");
        
        html5QrCode = new Html5Qrcode("reader");
        const config = {
            fps: 15,
            qrbox: { width: 300, height: 300 },
            aspectRatio: 1.0
        };
        
        html5QrCode.start(
            { facingMode: "environment" },  // 用後置相機
            config,
            onScanSuccess,
            onScanFailure
        ).then(() => {
            scannerStarted = true;
            addLog("✅ 掃描器已啟動，請對準條碼");
            document.getElementById("statusBadge").innerText = "掃描中";
            document.getElementById("statusBadge").style.background = "#34c759";
        }).catch(err => {
            addLog(`❌ 無法啟動相機：${err}`);
            alert("無法開啟相機，請確認已授予相機權限");
            scannerStarted = false;
        });
    }

    function stopScanner() {
        if (html5QrCode && scannerStarted) {
            html5QrCode.stop().then(() => {
                scannerStarted = false;
                addLog("⏹️ 掃描器已停止");
                document.getElementById("statusBadge").innerText = "已停止";
                document.getElementById("statusBadge").style.background = "#8e8e93";
            }).catch(err => {
                addLog(`⚠️ 停止時出錯：${err}`);
            });
        } else {
            addLog("⚠️ 掃描器未啟動");
        }
    }

    document.getElementById("startBtn").onclick = startScanner;
    document.getElementById("stopBtn").onclick = stopScanner;
    document.getElementById("clearBtn").onclick = () => {
        resultBody.innerHTML = "";
        scanCount = 0;
        document.getElementById("scanResult").innerHTML = "尚未掃描到任何條碼";
        addLog("🗑️ 記錄已清空");
    };

    addLog("✅ 頁面已載入，按「開啟相機」開始");
</script>
</body>
</html>
